<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENA Badminton Club</title>

    <!-- META TAG ANTI-CACHE -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>

    <!-- Firebase SDK (v8) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <!-- CUSTOM THEME OVERRIDES & RESPONSIVE FIXES -->
    <style>
        *, ::before, ::after {
            box-sizing: border-box;
        }
        html, body {
            max-width: 100vw;
            overflow-x: hidden;
        }
        html:not(.dark) body {
            background-color: #F1F5F9;
            color: #1E293B;
        }
        html:not(.dark) header {
            background-color: #FFFFFF;
            border-color: #E2E8F0;
        }
        html:not(.dark) .bg-\[\#1E2638\] {
            background-color: #FFFFFF !important;
            border-color: #E2E8F0 !important;
        }
        html:not(.dark) .bg-\[\#0B0F17\] {
            background-color: #F8FAFC !important;
            border-color: #E2E8F0 !important;
        }
        html:not(.dark) .text-white {
            color: #0F172A !important;
        }
        html:not(.dark) .text-slate-200, 
        html:not(.dark) .text-slate-300 {
            color: #334155 !important;
        }
        html:not(.dark) .text-slate-400, 
        html:not(.dark) .text-slate-500 {
            color: #64748B !important;
        }
        html:not(.dark) .border-slate-800,
        html:not(.dark) .border-slate-800\/80,
        html:not(.dark) .border-slate-800\/50,
        html:not(.dark) .border-slate-800\/40,
        html:not(.dark) .border-slate-900\/60 {
            border-color: #E2E8F0 !important;
        }
        html:not(.dark) input, 
        html:not(.dark) select {
            color: #0F172A !important;
        }
        
        input[type="month"] {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            min-height: 40px;
        }
        input[type="month"]::-webkit-calendar-picker-indicator {
            filter: invert(0.6) sepia(1) saturate(5) hue-rotate(330deg);
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-[#0B0F17] text-slate-200 min-h-screen font-sans antialiased pb-10 transition-colors duration-200">

    <!-- HEADER / NAVIGATION BAR -->
    <header class="bg-[#1E2638] border-b border-slate-800/80 sticky top-0 z-40 backdrop-blur-md bg-opacity-90 w-full">
        <div class="max-w-md mx-auto px-2.5 py-2 flex items-center justify-between gap-1 w-full">
            
            <!-- BRANDING LOGO & TULISAN SENA BADMINTON CLUB -->
            <div class="flex items-center gap-1.5 shrink-0">
                <span class="text-lg">🏸</span>
                <div class="flex flex-col leading-tight">
                    <h1 class="font-black text-xs tracking-tight text-white uppercase whitespace-nowrap">
                        <span class="text-[#FF5722]">SENA</span>
                    </h1>
                    <span class="text-[8px] font-bold tracking-wider text-slate-400 uppercase whitespace-nowrap">
                        BADMINTON CLUB
                    </span>
                </div>
            </div>
            
            <!-- RIGHT ACTIONS: TAB SWITCHER & THEME TOGGLE -->
            <div class="flex items-center gap-1.5 shrink-0">
                <!-- TAB SWITCHER MENU -->
                <div class="flex bg-[#0B0F17] p-1 rounded-xl border border-slate-800 w-48 sm:w-56">
                    <button id="btn-tab-matchmaking" onclick="switchTab('matchmaking')" class="flex-1 text-center py-1.5 text-xs font-bold rounded-lg bg-[#FF5722] text-white transition duration-200 shadow-md shadow-[#FF5722]/10">
                        Matches
                    </button>
                    <button id="btn-tab-leaderboard" onclick="switchTab('leaderboard')" class="flex-1 text-center py-1.5 text-xs font-bold rounded-lg text-slate-400 hover:text-white transition duration-200">
                        Rank
                    </button>
                    <button id="btn-tab-database" onclick="switchTab('database')" class="flex-1 text-center py-1.5 text-xs font-bold rounded-lg text-slate-400 hover:text-white transition duration-200">
                        Members
                    </button>
                </div>

                <!-- LIGHT / NIGHT MODE TOGGLE BUTTON -->
                <button onclick="toggleTheme()" id="btn-theme-toggle" title="Toggle Light/Dark Mode" class="bg-[#0B0F17] hover:bg-slate-800 p-1 rounded-xl border border-slate-800 text-xs flex items-center justify-center transition shrink-0 w-8 h-8">
                    🌙
                </button>
            </div>
        </div>
    </header>

    <!-- MAIN APP CONTENT CONTAINER -->
    <main id="app-content" class="max-w-md mx-auto px-3 pt-3 space-y-3.5 w-full">
        <!-- Dynamic content injected by app.js -->
    </main>

    <!-- SCRIPT APPLICATION -->
    <script src="app.js?v=1.3.1"></script>
</body>
</html>

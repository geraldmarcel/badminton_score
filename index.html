<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton Matchmaker & Leaderboard</title>

    <!-- META TAG ANTI-CACHE (Pencegah Device Menggunakan JS Versi Lama) -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Firebase SDK (v8) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-[#0B0F17] text-slate-200 min-h-screen font-sans antialiased pb-10">

    <!-- HEADER / NAVIGATION BAR -->
    <header class="bg-[#1E2638] border-b border-slate-800/80 sticky top-0 z-40 backdrop-blur-md bg-opacity-90">
        <div class="max-w-md mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="text-xl">🏸</span>
                <h1 class="font-black text-sm tracking-wide text-white uppercase">Badminton <span class="text-[#FF5722]">Club</span></h1>
            </div>
            
            <!-- TAB SWITCHER -->
            <div class="flex bg-[#0B0F17] p-1 rounded-xl border border-slate-800 w-60">
                <button id="btn-tab-matchmaking" onclick="switchTab('matchmaking')" class="flex-1 text-center py-1.5 text-xs font-bold rounded-lg bg-[#FF5722] text-white transition duration-200 shadow-md shadow-[#FF5722]/10">
                    Matches
                </button>
                <button id="btn-tab-leaderboard" onclick="switchTab('leaderboard')" class="flex-1 text-center py-1.5 text-xs font-bold rounded-lg text-slate-400 hover:text-white transition duration-200">
                    Rank
                </button>
                <button id="btn-tab-database" onclick="switchTab('database')" class="flex-1 text-center py-1.5 text-xs font-bold rounded-lg text-slate-400 hover:text-white transition duration-200">
                    Members
                </button>
            </div>
        </div>
    </header>

    <!-- MAIN APP CONTENT CONTAINER -->
    <main id="app-content" class="max-w-md mx-auto px-4 pt-4 space-y-4">
        <!-- Content will be dynamically rendered by app.js -->
    </main>

    <!-- SCRIPT APPLICATION DENGAN CACHE BUSTING VERSIONING -->
    <script src="app.js?v=1.0.3"></script>
</body>
</html>
